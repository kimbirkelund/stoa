name: CI

# Runs on the GitHub mirror of the Codeberg repo. Codeberg is the source of
# truth; this provides the hosted macOS/Windows/Linux matrix that Codeberg's
# Linux-only CI can't (validates R-1 cross-platform startup).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ESLint + Prettier (format check) + tsc.
      - name: Lint
        shell: pwsh
        run: ./build.ps1 -DoLint -SkipInstall

      # Lint the workflow files themselves.
      - name: Lint GitHub workflows (actionlint)
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error

  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Electron needs a display; Linux runners are headless, so wrap in xvfb.
      # build.ps1 -DoTest builds then runs the Playwright acceptance tests.
      - name: Build and test (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: xvfb-run -a pwsh ./build.ps1 -DoTest -SkipInstall

      - name: Build and test (Windows / macOS)
        if: runner.os != 'Linux'
        shell: pwsh
        run: ./build.ps1 -DoTest -SkipInstall
