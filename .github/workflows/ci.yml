name: CI

# Runs on the GitHub mirror of the Codeberg repo. Codeberg is the source of
# truth; this provides the hosted macOS/Windows/Linux matrix that Codeberg's
# Linux-only CI can't (validates R-1 cross-platform startup).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ESLint + Prettier (format check) + tsc.
      - name: Lint
        shell: pwsh
        run: ./build.ps1 -DoLint -SkipInstall

      # Exercise the static Storybook build here so a build-only break (bad MDX,
      # bundler config, broken asset import) fails CI rather than only the
      # downstream Storybook publish workflow.
      - name: Build static Storybook
        shell: pwsh
        run: ./build.ps1 -DoStorybook -Static -SkipInstall
        env:
          STORYBOOK_DISABLE_TELEMETRY: '1'

      # Lint the workflow files themselves.
      - name: Lint GitHub workflows (actionlint)
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error

  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The component test tier runs Storybook stories in headless Chromium;
      # Linux needs the browser's system libraries. (build.ps1 installs the
      # Chromium binary itself before that tier on every OS.)
      - name: Install Playwright system deps (Linux)
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium

      # Electron needs a display; Linux runners are headless, so wrap in xvfb.
      # build.ps1 -DoTest builds then runs all three test tiers.
      - name: Build and test (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: xvfb-run -a pwsh ./build.ps1 -DoTest -SkipInstall

      - name: Build and test (Windows / macOS)
        if: runner.os != 'Linux'
        shell: pwsh
        run: ./build.ps1 -DoTest -SkipInstall
