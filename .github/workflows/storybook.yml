name: Storybook

# Build the Storybook component showcase and publish it to GitHub Pages.
# Requires Pages to be enabled for the repo with the source set to
# "GitHub Actions" (Settings → Pages → Build and deployment → Source).
#
# Triggered when the CI workflow finishes on main: only publish a showcase
# from a commit whose cross-platform tests passed. The success gate lives on
# the jobs (workflow_run can't filter on conclusion).
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    # Only publish when the triggering CI run succeeded.
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v7
        with:
          # Build the same commit CI validated, not just main's tip.
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static Storybook
        shell: pwsh
        run: ./build.ps1 -DoStorybook -Static -SkipInstall
        env:
          STORYBOOK_DISABLE_TELEMETRY: '1'

      - uses: actions/configure-pages@v5
        with:
          # Enable Pages (Actions source) if it isn't already, so the first run
          # on a fresh repo doesn't fail.
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
