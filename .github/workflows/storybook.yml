name: Storybook

# Build the Storybook component showcase and publish it to GitHub Pages.
# Requires Pages to be enabled for the repo with the source set to
# "GitHub Actions" (Settings → Pages → Build and deployment → Source).
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static Storybook
        shell: pwsh
        run: ./build.ps1 -DoStorybook -Static -SkipInstall
        env:
          STORYBOOK_DISABLE_TELEMETRY: '1'

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
